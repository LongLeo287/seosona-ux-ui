<!-- Footer: Minimal
     UX-UI System — 4_LIBRARY/components/footer/footer-minimal.html
     Usage: Landing pages, single-page sites, campaign pages
-->

<style>
  .footer-minimal {
    padding: 1.5rem 0;
    border-top: 1px solid var(--color-border, #E2E8F0);
    background: var(--color-bg-base, #FFFFFF);
  }
  .footer-minimal__inner {
    max-width: var(--container-max, 1280px);
    margin: 0 auto;
    padding: 0 var(--container-px, 1.5rem);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .footer-minimal__copy {
    font-size: 0.875rem;
    color: var(--color-text-muted, #94A3B8);
  }
  .footer-minimal__links {
    display: flex;
    gap: 1.5rem;
  }
  .footer-minimal__links a {
    font-size: 0.875rem;
    color: var(--color-text-muted, #94A3B8);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer-minimal__links a:hover {
    color: var(--color-text-primary, #04091A);
  }

  /* Dark theme variant — add class="footer-minimal footer-minimal--dark" */
  .footer-minimal--dark {
    background: var(--color-bg-surface, #040C1B);
    border-color: var(--color-border, rgba(59,130,246,0.12));
  }
  .footer-minimal--dark .footer-minimal__copy,
  .footer-minimal--dark .footer-minimal__links a {
    color: var(--color-text-muted, #4B6B8A);
  }
  .footer-minimal--dark .footer-minimal__links a:hover {
    color: var(--color-text-primary, #F0F6FF);
  }

  @media (max-width: 640px) {
    .footer-minimal__inner { flex-direction: column; text-align: center; }
  }
</style>

<footer class="footer-minimal">
  <div class="footer-minimal__inner">
    <p class="footer-minimal__copy">
      &copy; <span data-year></span> [Brand Name]. All rights reserved.
    </p>
    <nav class="footer-minimal__links" aria-label="Footer">
      <a href="/privacy">Privacy</a>
      <a href="/terms">Terms</a>
      <a href="/contact">Contact</a>
    </nav>
  </div>
</footer>

<script>
  // Auto-set copyright year
  document.querySelectorAll('[data-year]').forEach(el => {
    el.textContent = new Date().getFullYear();
  });
</script>
