<!--
  Component: Sticky Navigation Bar
  Type: navigation
  Variant: sticky-light
  Description: Responsive sticky navbar — desktop links + mobile hamburger menu
  Palette: Uses CSS custom properties — swap palette by importing different palette file
  Version: 1.0
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar Sticky — Component Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font: inherit; }

    :root {
      --color-bg-base:      #FFFFFF;
      --color-text-primary: #04091A;
      --color-text-body:    #64748B;
      --color-accent:       #1D4ED8;
      --color-border:       #E2E8F0;
      --color-bg-inverted:  #04091A;
      --color-text-inverse: #FFFFFF;
      --font-body: 'Inter', sans-serif;
      --font-heading: 'Poppins', sans-serif;
      --transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* ─── Navbar ─────────────────────────────── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgb(255 255 255 / 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--color-border);
      transition: box-shadow 0.3s;
    }
    .nav.scrolled {
      box-shadow: 0 1px 20px 0 rgb(0 0 0 / 0.08);
    }

    .nav__inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 4rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    /* Logo */
    .nav__logo {
      font-family: var(--font-heading);
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--color-text-primary);
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }
    .nav__logo span { color: var(--color-accent); }

    /* Desktop links */
    .nav__links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      margin-left: auto;
    }
    .nav__link {
      font-family: var(--font-body);
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--color-text-body);
      padding: 0.375rem 0.75rem;
      border-radius: 0.5rem;
      transition: var(--transition);
    }
    .nav__link:hover {
      color: var(--color-text-primary);
      background: #F8FAFC;
    }
    .nav__link.active {
      color: var(--color-accent);
      background: #EFF6FF;
    }

    /* CTA */
    .nav__cta {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.5rem 1.125rem;
      background: var(--color-bg-inverted);
      color: var(--color-text-inverse);
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 600;
      border-radius: 9999px;
      flex-shrink: 0;
      transition: var(--transition);
    }
    .nav__cta:hover {
      background: var(--color-accent);
      box-shadow: 0 8px 20px -4px rgb(29 78 216 / 0.3);
      transform: translateY(-1px);
    }
    .nav__cta:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* Hamburger */
    .nav__toggle {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 36px;
      height: 36px;
      padding: 6px;
      border-radius: 0.5rem;
      margin-left: auto;
      transition: background 0.2s;
    }
    .nav__toggle:hover { background: #F8FAFC; }
    .nav__toggle span {
      display: block;
      width: 100%;
      height: 2px;
      background: var(--color-text-primary);
      border-radius: 2px;
      transition: transform 0.3s, opacity 0.3s;
      transform-origin: center;
    }
    .nav__toggle[aria-expanded="true"] span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav__toggle[aria-expanded="true"] span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .nav__toggle[aria-expanded="true"] span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* Mobile menu */
    .nav__mobile {
      display: none;
      flex-direction: column;
      gap: 0.25rem;
      padding: 0.75rem 1.5rem 1.25rem;
      border-top: 1px solid var(--color-border);
      background: var(--color-bg-base);
    }
    .nav__mobile.open { display: flex; }
    .nav__mobile .nav__link {
      padding: 0.75rem 0.875rem;
      font-size: 1rem;
    }
    .nav__mobile .nav__cta {
      margin-top: 0.5rem;
      justify-content: center;
      padding: 0.75rem;
    }

    /* ─── Responsive ──────────────────────────── */
    @media (max-width: 768px) {
      .nav__links, .nav__cta { display: none; }
      .nav__toggle { display: flex; }
    }

    /* ─── Demo page stub ─────────────────────── */
    body { font-family: var(--font-body); background: #F8FAFC; }
    .demo-content {
      max-width: 1280px;
      margin: 4rem auto;
      padding: 0 1.5rem;
      text-align: center;
      color: var(--color-text-body);
    }
  </style>
</head>
<body>

<header class="nav" id="nav" role="banner">
  <div class="nav__inner">
    <a href="/" class="nav__logo" aria-label="Brand homepage">
      Brand<span>Name</span>
    </a>

    <!-- Desktop nav -->
    <nav class="nav__links" aria-label="Main navigation">
      <a href="#" class="nav__link active" aria-current="page">Home</a>
      <a href="#" class="nav__link">Features</a>
      <a href="#" class="nav__link">Pricing</a>
      <a href="#" class="nav__link">About</a>
      <a href="#" class="nav__link">Blog</a>
    </nav>

    <a href="#cta" class="nav__cta">
      Get Started
      <i data-lucide="arrow-right" style="width:14px;height:14px;" aria-hidden="true"></i>
    </a>

    <!-- Mobile toggle -->
    <button
      class="nav__toggle"
      id="nav-toggle"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="nav-mobile"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile menu -->
  <nav class="nav__mobile" id="nav-mobile" aria-label="Mobile navigation">
    <a href="#" class="nav__link active" aria-current="page">Home</a>
    <a href="#" class="nav__link">Features</a>
    <a href="#" class="nav__link">Pricing</a>
    <a href="#" class="nav__link">About</a>
    <a href="#" class="nav__link">Blog</a>
    <a href="#cta" class="nav__cta">Get Started</a>
  </nav>
</header>

<div class="demo-content">
  <p>Scroll down to see sticky effect &darr;</p>
  <div style="height:200vh;"></div>
</div>

<script>
  // Scroll shadow
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 10);
  }, { passive: true });

  // Mobile toggle
  const toggle = document.getElementById('nav-toggle');
  const mobileMenu = document.getElementById('nav-mobile');
  toggle.addEventListener('click', () => {
    const isOpen = toggle.getAttribute('aria-expanded') === 'true';
    toggle.setAttribute('aria-expanded', String(!isOpen));
    toggle.setAttribute('aria-label', isOpen ? 'Open menu' : 'Close menu');
    mobileMenu.classList.toggle('open');
  });

  // Close mobile menu on link click
  mobileMenu.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      toggle.setAttribute('aria-expanded', 'false');
      toggle.setAttribute('aria-label', 'Open menu');
      mobileMenu.classList.remove('open');
    });
  });

  // Init Lucide
  if (typeof lucide !== 'undefined') lucide.createIcons();
</script>
</body>
</html>
