<!-- Card: Blog Post / Article Preview
     UX-UI System — 4_LIBRARY/components/cards/card-blog.html
     Usage: Blog listing pages, content hubs, SEO article sections
-->

<style>
  .blog-card {
    background: var(--color-bg-base, #FFFFFF);
    border: 1px solid var(--color-border, #E2E8F0);
    border-radius: var(--radius-xl, 1.25rem);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.3s;
  }
  .blog-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px -6px rgb(0 0 0 / 0.1);
  }
  .blog-card__img {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    background: var(--color-bg-elevated, #F1F5F9);
    display: block;
  }
  .blog-card__img-placeholder {
    aspect-ratio: 16 / 9;
    background: linear-gradient(135deg, var(--color-bg-elevated, #F1F5F9) 0%, #E2E8F0 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-text-muted, #94A3B8);
  }
  .blog-card__body {
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    flex: 1;
  }
  .blog-card__meta {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .blog-card__category {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--color-accent, #1D4ED8);
    background: var(--color-accent-light, #EFF6FF);
    padding: 0.25rem 0.625rem;
    border-radius: 9999px;
    text-decoration: none;
  }
  .blog-card__date {
    font-size: 0.8125rem;
    color: var(--color-text-muted, #94A3B8);
  }
  .blog-card__read {
    font-size: 0.8125rem;
    color: var(--color-text-muted, #94A3B8);
  }
  .blog-card__read::before { content: '· '; }
  .blog-card__title {
    font-family: var(--font-heading, 'Inter', sans-serif);
    font-size: 1.0625rem;
    font-weight: 700;
    color: var(--color-text-primary, #04091A);
    line-height: 1.35;
    text-decoration: none;
    display: block;
  }
  .blog-card__title:hover { color: var(--color-accent, #1D4ED8); }
  .blog-card__excerpt {
    font-size: 0.9375rem;
    line-height: 1.65;
    color: var(--color-text-body, #64748B);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    flex: 1;
  }
  .blog-card__footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 1rem;
    border-top: 1px solid var(--color-border, #E2E8F0);
    margin-top: auto;
  }
  .blog-card__author {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .blog-card__av {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--color-accent-light, #EFF6FF);
    color: var(--color-accent, #1D4ED8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    flex-shrink: 0;
  }
  .blog-card__author-name {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--color-text-primary, #04091A);
  }
  .blog-card__cta {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--color-accent, #1D4ED8);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.25rem;
    transition: gap 0.2s;
  }
  .blog-card__cta:hover { gap: 0.5rem; }
</style>

<!--
  === USAGE ===
  Replace [placeholder] values with real content.
  Add data-animate="fade-up" for scroll reveal.
  Link the image src to actual article hero image.
-->

<article class="blog-card" data-animate="fade-up">

  <!-- Option A: Real image -->
  <!-- <img class="blog-card__img" src="[image-path]" alt="[Article visual description]" width="800" height="450" loading="lazy"> -->

  <!-- Option B: Placeholder (remove when using real image) -->
  <div class="blog-card__img-placeholder" aria-hidden="true" role="img" aria-label="Article image placeholder">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
  </div>

  <div class="blog-card__body">
    <div class="blog-card__meta">
      <a href="#" class="blog-card__category">[Category]</a>
      <time class="blog-card__date" datetime="[YYYY-MM-DD]">[Month DD, YYYY]</time>
      <span class="blog-card__read">[X] min read</span>
    </div>

    <a href="#" class="blog-card__title">
      [Article headline — max 70 characters for readability]
    </a>

    <p class="blog-card__excerpt">
      [2–3 sentence excerpt from the article. This should hook the reader and give them a reason to click through. Keep it tight.]
    </p>

    <footer class="blog-card__footer">
      <div class="blog-card__author">
        <div class="blog-card__av" aria-hidden="true">[XX]</div>
        <span class="blog-card__author-name">[Author Name]</span>
      </div>
      <a href="#" class="blog-card__cta" aria-label="Read [Article headline]">
        Read
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </footer>
  </div>

</article>
